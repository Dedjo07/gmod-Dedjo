<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden; background-color: #000;
            background-image: url('background.jpg');
            background-size: cover; background-position: center;
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .info {
            background: rgba(0, 0, 0, 0.7);
            color: white; padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid #555;
        }
        h1 { margin: 0; font-size: 2.5em; color: #ff9d00; }
        p { font-size: 1.2em; margin: 10px 0 0; }
    </style>
</head>
<body>
    <div class="info">
        <h1 id="servername">Загрузка...</h1>
        <p id="status">Подключение к серверу</p>
    </div>

    <script>
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            document.getElementById('servername').innerHTML = servername;
        }
        function SetStatusChanged(status) {
            document.getElementById('status').innerHTML = status;
        }
    </script>
</body>
</html>
